version: '3.8'

services:
  # MySQL数据库（针对2GB内存优化）
  mysql:
    image: mysql:8.0
    container_name: pawfu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    command:
      - --max_connections=100
      - --innodb_buffer_pool_size=256M
      - --innodb_log_buffer_size=8M
      - --key_buffer_size=16M
      - --thread_cache_size=8
      - --query_cache_type=0
      - --query_cache_size=0
      - --tmp_table_size=32M
      - --max_heap_table_size=32M
      - --table_open_cache=64
      - --default-authentication-plugin=mysql_native_password
    networks:
      - pawfu-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: pawfu-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - pawfu-network

  # 后端服务（针对2GB内存优化）
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pawfu-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_DATABASE}
      - DB_USER=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=35
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - pawfu-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pawfu-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
    networks:
      - pawfu-network

networks:
  pawfu-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
