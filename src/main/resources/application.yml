server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pet-adoption-service
  
  # MySQL数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# 本地文件存储配置
file:
  storage:
    local:
      path: uploads
      url-prefix: http://localhost:8080/api/uploads

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.petadoption.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret-key: pet-adoption-service-secret-key-2024-very-very-long-secret-key-for-security-and-encryption-purpose
  expiration: 7200000
  refresh-threshold: 300000
  header: Authorization
  prefix: Bearer

# Knife4j API文档配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志配置
logging:
  level:
    com.example.petadoption: info
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 浏览量统计配置
view:
  cache:
    expire: 86400
  suspicious:
    threshold: 10
    window: 60

# DeepSeek AI配置
# 生产环境请使用环境变量: export DEEPSEEK_API_KEY=your-key
deepseek:
  endpoint: https://api.deepseek.com/v1/chat/completions
  api-key: ${DEEPSEEK_API_KEY:sk-3255b4516def43a4a99b7d33d889297c}
  timeout: 15000
  connect-timeout: 5000
  model: deepseek-chat
  max-tokens: 2000

# AI客服配置
ai:
  prompt:
    context: |
      你是Paw福宠物服务平台的AI智能客服助手，专注于宠物养护、健康、训练和领养等领域的知识咨询。
      请遵循以下原则：
      1. 仅回答与宠物相关的问题
      2. 回答专业、准确、友好
      3. 涉及健康问题时提醒及时就医
      4. 保持回答简洁明了，控制在300字以内
  quick-questions: 如何喂养幼犬？,狗狗呕吐怎么办？,如何训练猫咪使用猫砂？,宠物驱虫多久一次？,如何领养宠物？
